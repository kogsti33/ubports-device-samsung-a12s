name: Build Ubuntu Touch kernel for A12s

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout device source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git gnupg flex bison gperf build-essential \
            zip curl libc6-dev libncurses5-dev \
            x11proto-core-dev libx11-dev \
            libgl1-mesa-dev \
            python3-markdown libxml2-utils \
            xsltproc zlib1g-dev schedtool liblz4-tool bc \
            lzop rsync cpio kmod libssl-dev libtinfo-dev \
            unzip wget xz-utils jq \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Download kernel source
        run: |
          curl -sL "https://github.com/rsuntk/android_kernel_samsung_a12s/archive/refs/heads/android-4.19-stable.tar.gz" -o kernel.tar.gz
          mkdir -p kernel-tree
          tar xzf kernel.tar.gz -C kernel-tree --strip-components=1
          rm kernel.tar.gz

      - name: Patch kernel for GCC 11+ compatibility
        run: |
          cd kernel-tree

          # Fix as-version.sh - new GCC assembler output not recognized by old kernel 4.19
          printf '#!/bin/sh\necho "GNU 110000"\nexit 0\n' > scripts/as-version.sh
          chmod +x scripts/as-version.sh

          # Remove all -Werror flags from Makefile
          sed -i '/-Werror/d' Makefile
          sed -i '/KBUILD_CFLAGS.*-Werror/d' Makefile
          sed -i '/KBUILD_AFLAGS.*-Werror/d' Makefile

          # Fix extern inline GCC 11+ issue in mm.h
          sed -i 's/extern inline/static inline/g' include/linux/mm.h 2>/dev/null || true

          echo "Patches applied"

      - name: Merge defconfig with halium.config
        run: |
          cd kernel-tree
          cat arch/arm64/configs/exynos850-a12snsxx_defconfig > /tmp/merged_defconfig
          echo "" >> /tmp/merged_defconfig
          echo "# Halium/UBports additions" >> /tmp/merged_defconfig
          cat "$GITHUB_WORKSPACE/halium.config" >> /tmp/merged_defconfig
          cp /tmp/merged_defconfig arch/arm64/configs/ubports_a12s_defconfig

      - name: Build kernel
        run: |
          cd kernel-tree
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- ubports_a12s_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=aarch64-linux-gnu-gcc LD=aarch64-linux-gnu-ld AR=aarch64-linux-gnu-ar OBJCOPY=aarch64-linux-gnu-objcopy OBJDUMP=aarch64-linux-gnu-objdump NM=aarch64-linux-gnu-nm STRIP=aarch64-linux-gnu-strip -j$(nproc) Image dtbs modules 2>&1 | tail -30

      - name: Create boot.img (Samsung Exynos 850 v2)
        run: |
          mkdir -p output
          cp kernel-tree/arch/arm64/boot/Image output/

          cat > /tmp/mkbootimg.py << 'PYEOF'
          #!/usr/bin/env python3
          import struct, sys, os

          def align(v, a):
              return (v + a - 1) & ~(a - 1)

          def write_boot_img(kernel_path, output_path):
              kernel = open(kernel_path, 'rb').read()
              page_size = 2048
              header_version = 2
              header_size = page_size
              kernel_addr = 0x10008000
              ramdisk_addr = 0x11000000
              tags_addr = 0x10000100
              kernel_size = len(kernel)

              kernel_offset = align(header_size, page_size)
              ramdisk_offset = kernel_offset + align(kernel_size, page_size)
              total_size = ramdisk_offset

              os_version = (11 << 14) | (0 << 7) | 0
              os_patch_level = (23 << 4) | 1

              header = bytearray(header_size)
              header[0:8] = b'ANDROID!'
              struct.pack_into('<I', header, 8, kernel_size)
              struct.pack_into('<I', header, 12, kernel_addr)
              struct.pack_into('<I', header, 16, 0)
              struct.pack_into('<I', header, 20, ramdisk_addr)
              struct.pack_into('<I', header, 24, 0)
              struct.pack_into('<I', header, 28, 0)
              struct.pack_into('<I', header, 32, tags_addr)
              struct.pack_into('<I', header, 36, page_size)
              struct.pack_into('<I', header, 40, header_version)
              struct.pack_into('<I', header, 44, (os_version << 16) | os_patch_level)

              name = b'SRPUE06B013'
              header[48:48+len(name)] = name

              cmdline = b'console=tty0 androidboot.hardware=exynos850 androidboot.selinux=enforce loop.max_part=7'
              header[576:576+len(cmdline)] = cmdline

              with open(output_path, 'wb') as f:
                  f.write(header)
                  f.write(kernel)
                  f.write(b'\x00' * (total_size - header_size - kernel_size))

              print(f"boot.img: {os.path.getsize(output_path)} bytes")
              print(f"  kernel: {kernel_size} bytes @ 0x{kernel_addr:08x}")

          write_boot_img(sys.argv[1], sys.argv[2])
          PYEOF

          python3 /tmp/mkbootimg.py output/Image output/boot.img
          ls -lh output/

      - name: Rename all artifacts to .img for TWRP
        run: |
          cd output
          cp boot.img boot.img
          for f in *.dtb; do [ -f "$f" ] && cp "$f" "${f%.dtb}.dtb.img"; done 2>/dev/null || true
          for f in *.dtbo; do [ -f "$f" ] && cp "$f" "${f%.dtbo}.dtbo.img"; done 2>/dev/null || true
          echo "=== Final artifacts ==="
          ls -lh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-A12s-Ubports-Boot
          path: output/boot.img
          if-no-files-found: error

      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-A12s-kernel
          path: output/Image
          if-no-files-found: error
